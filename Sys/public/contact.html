<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweet Royals Home</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-image: url("bg3.jpg");
    background-size: cover;
    background-position: center ;
    background-position-y: 65px;
    background-repeat: no-repeat;
}

header {
    background: #a9792c;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

/* Logo */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    width: 50px;
    height: 50px;
    border-radius: 50%;
}

/* Nav Buttons */
.nav-center {
    display: flex;
    gap: 15px;
}

.nav-btn {
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.menu-btn {
    background: #333;
    color: white;
}

.login-btn {
    background: #e53935;
    color: white;
}

.checkout-btn {
    background: #222;
    color: white;
}

/* Profile*/
.profile {
    width: 40px;
    height: 40px;
    background: black;
    border-radius: 50%;
}

/* SEARCH */
.search-bar {
    margin: 25px auto;
    width: 60%;
    max-width: 500px;
    background: #d9d9d9;
    border-radius: 25px;
    display: flex;
    align-items: center;
    padding: 10px 15px;
}

.search-bar input {
    border: none;
    background: transparent;
    width: 100%;
    outline: none;
    font-size: 14px;
}

.main-content {
    text-align: center;
    padding: 10px 20px;
}

.main-content h1 {
    margin-bottom: 30px;
}

/*MAP AND OTHER INFORMATION*/
.info-section {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    flex-wrap: wrap;
    padding: 20px;
}


.map-container iframe {
    width: 350px;
    height: 250px;
    border: none;
    border-radius: 15px;
}


.contact-info {
    text-align: left;
    font-size: 16px;
    line-height: 2;
}

/*MAGIC*/
@media (max-width: 768px) {
    .info-section {
        flex-direction: column;
    }

    .search-bar {
        width: 80%;
    }
}
</style>
</head>

<body>  

<header>
    <!-- Logo -->
    <div class="logo">
        <img src="logo_and_product\logo.png" alt="Sweet Royals Logo">
    </div>

    <!-- Navigation -->
    <div class="nav-center">
        <button class="nav-btn menu-btn" onclick="goToMenu()">Menu</button>
        <button class="nav-btn login-btn" onclick="goToLogin()">Return to Login</button>
        <button class="nav-btn checkout-btn" onclick="goToCheckout()">Check Out</button>
    </div>

    
    <div class="profile"></div>
</header>

<!-- Search Bar -->
<div class="search-bar">
    <input type="text" placeholder="Hinted search text">
</div>

<div class="main-content">
    <h1>Sweet Royals Online Ordering and Delivering System</h1>
</div>


<div class="info-section">

    <!-- Map -->
    <div class="map-container">
        <iframe
            src="https://www.google.com/maps?q=Alipay+Street,+Poblacion+Sur,+Rizal,+Nueva+Ecija&output=embed"
            loading="lazy"
            allowfullscreen>
        </iframe>
    </div>

    <!-- Contact Info -->
    <div class="contact-info">
        <p><strong>Contact Number:</strong> 0930 *** **80</p>
        <p><strong>Shop Location:</strong> Alipay Street, Poblacion Sur, Rizal, Nueva Ecija</p>
        <p><strong>Email:</strong> hashisa******@gmail.com</p>
    </div>

</div>

<script src="contact.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sweet Royals Register</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-image: url("bg3.jpg");
    background-size: cover;
    background-position: center;
    background-position-y: 65px;
    background-repeat: no-repeat;
}

.header {
    background-color: #a6782e;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header img {
    width: 50px;
    height: 50px;
    border-radius: 50%;
}

.header-text {
    font-size: 16px;
    font-weight: 500;
}

.container {
    width: 400px;
    margin: 60px auto;
    background: #e0b677c8;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
}

input {
    margin: 10px;
    padding: 5px;
    width: 200px;
}

button {
    padding: 8px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin: 10px;
}

.return-btn {
    background: #caa25e;
}

.register-btn {
    background: #4dcae6;
}

</style>
</head>

<body>

<div class="header">    
    <img src="logo_and_product/logo.png" alt="Logo">
    <div class="header-text">
        Welcome to Sweet Royals Online Shop. Where you order we Deliver with care
    </div>
    <div style="width:35px;height:35px;background:#a6782e;border-radius:50%;"></div>
</div>

<div class="container">
    <h1>REGISTER FORM</h1>

    <div>
        <label>USERNAME</label><br>
        <input type="text" id="regUsername">
    </div>

    <div>
        <label>EMAIL/CONTACT</label><br>
        <input type="text" id="regEmail">
    </div>

    <div>
        <label>PASSWORD</label><br>
        <input type="password" id="regPassword">
    </div>

    <div>
        <label>ADDRESS</label><br>
        <input type="text" id="regAddress">
    </div>

    <button class="return-btn" onclick="goBack()">Return</button>
    <button class="register-btn" onclick="register()">Register</button>

</div>

<script src="api-client.js"></script>
<script src="register.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background-color: #bfc3db;
}

/* HEADER */
header {
    background: #a9792c;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
}

.nav-center {
    display: flex;
    gap: 15px;
}

.nav-btn {
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.menu-btn { background: #333; color: white; }
.contact-btn { background: #444; color: white; }
.login-btn { background: red; color: white; }

/* PROFILE CARD */
.profile-container {
    width: 500px;
    margin: 60px auto;
    background: #c9c5e8;
    padding: 40px;
    border-radius: 15px;
    text-align: center;
}

.profile-icon {
    width: 80px;
    height: 80px;
    background: black;
    border-radius: 50%;
    margin: 0 auto 15px;
}

.profile-container h3 {
    margin-bottom: 5px;
}

.profile-buttons {
    margin-top: 20px;
}

.profile-buttons button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: 1px solid #aaa;
    background: white;
    cursor: pointer;
    text-align: left;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    width: 350px;
    padding: 20px;
    border-radius: 8px;
}

.modal-content h3 {
    margin-bottom: 15px;
}

.modal-content input {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
}

.save-btn {
    background: #1e88e5;
    color: white;
    border: none;
    padding: 8px 15px;
    cursor: pointer;
    border-radius: 5px;
}
</style>

</head>

<body>

<header>
    <div class="logo">
        <img src="logo_and_product\logo.png">
    </div>

    <div class="nav-center">
        <button class="nav-btn menu-btn">Menu</button>
        <button class="nav-btn contact-btn">Contact and Location</button>
        <button class="nav-btn login-btn" onclick="logout()">Return to Login</button>
    </div>

    <div class="logo">
        <img src="logo.png">
    </div>
</header>

<div class="profile-container">
    <div class="profile-icon"></div>
    <h3 id="displayName">Your Name</h3>
    <p id="displayNumber">Contact Number</p>

    <div class="profile-buttons">
        <button onclick="openModal()">My Profile</button>
        <button>Notification: On</button>
    </div>
</div>
    
<div class="modal" id="editModal">
    <div class="modal-content">
        <h3>Edit Profile</h3>

        <input type="text" id="nameInput" placeholder="Name">
        <input type="text" id="numberInput" placeholder="Mobile Number">
        <input type="text" id="locationInput" placeholder="Location">

        <button class="save-btn" onclick="saveProfile()">Save Changes</button>
    </div>
</div>

<script src="api-client.js"></script>
<script src="profile.js"></script>

</body>
</html>

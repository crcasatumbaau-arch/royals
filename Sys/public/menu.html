<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sweet Royals Shop</title>

<style>
html, body {
    height: 100%;
}

body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-image: url("bg3.jpg");
    background-size: cover;
    background-position: center;
    background-position-y: 65px;
    background-repeat: no-repeat;
    overflow-y: scroll;
}   


.header {
    background: #a6782e;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header img {
    width: 50px;
    height: 50px;
    border-radius: 50%;
}

.header-text {
    font-size: 16px;
    font-weight: 500;
}

.header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
}

.search,
.container {
    margin-top: 80px;
}


.nav-btn {
    padding: 8px 15px;
    margin: 5px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.return-btn {
    background: red;
    color: white;
}

.checkout-btn {
    background: #333;
    color: white;
}

.contact-btn {
    background: #444;
    color: white;
}

.profile-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background-color: #333;
    cursor: pointer;
    background-image: url('logo_and_product/user.jpg');
    background-size: cover;
    background-position: center;
    margin-left: 50px;
    margin-right: 20px;
}

/* SEARCH BAR */
.search {
    text-align: center;
    margin: 20px;
    margin-top: 100px;
}

.search input {
    padding: 8px;
    width: 300px;
}


.container {
    width: 70%;
    margin: 40px auto;
}

/* PRODUCT ITEMS */
.product {
    display: flex;
    margin-bottom: 30px;
    background-color: #edd68ab4;
    padding: 10px;
    border-radius: 10px;
}

.product img {
    width: 150px;
    height: 150px;
    border-radius: 10px;
    margin-right: 20px;
}

/* + - BUTTONS */
.counter {
    margin-top: 10px;
}

.counter button {
    padding: 5px 10px;
    font-size: 16px;
    cursor: pointer;
}

.counter span {
    margin: 0 15px;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="header">
    <img src="logo_and_product/logo.png" alt="Logo">

    <div>
        <button class="nav-btn contact-btn">Contact and Location</button>
        <button class="nav-btn return-btn" onclick="logout()">Return to Login</button>
        <button class="nav-btn checkout-btn" onclick="checkout()">Check Out</button>
    </div>
    <button class="profile-btn" onclick="profileClick()"></button>
</div>

<div class="search">
    <input type="text" placeholder="Hinted search text">
</div>

<div class="container">

    <!-- Strawberry Cake -->
    <div class="product">
        <img src="logo_and_product/Scake.jpg">
        <div>
            <h3>Strawberry Cake</h3>
            <b>PHP 211.00</b>   
            <p>Delicious sweet strawberry cake for 3 persons.</p>
            <div class="counter">
                <button onclick="changeQty('cake', -1)">-</button>
                <span id="cake">0</span>
                <button onclick="changeQty('cake', 1)">+</button>
            </div>
        </div>
    </div>

    <!-- Cookie -->
    <div class="product">
        <img src="logo_and_product/Cookies.jpg">
        <div>
            <h3>Cookie</h3>
            <b>PHP 36.30</b>
            <p>Sweet chocolate cookies with 2 flavors.</p>
            <div class="counter">
                <button onclick="changeQty('cookie', -1)">-</button>
                <span id="cookie">0</span>
                <button onclick="changeQty('cookie', 1)">+</button>
            </div>
        </div>
    </div>

    <!-- Pudding -->
    <div class="product">
        <img src="logo_and_product/pudding.jpg">
        <div>
            <h3>Pudding</h3>
            <b>PHP 20.00</b>
            <p>Light dessert great for one person.</p>
            <div class="counter">
                <button onclick="changeQty('pudding', -1)">-</button>
                <span id="pudding">0</span>
                <button onclick="changeQty('pudding', 1)">+</button>
            </div>
        </div>
    </div>

</div>

<script src="api-client.js"></script>
<script src="menu.js"></script>
</body>
</html>

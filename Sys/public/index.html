    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Royals Login</title>

    <style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background-image: url("bg3.jpg");
        background-size: cover;
        background-position: center;
        background-position-y: 65px;
        background-repeat: no-repeat;
        min-height: 100vh;
    }

    /* HEADER */
    .header {
        background-color: #a6782e;
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        text-align: center;
    }

    .header img {
        width: 50px;
        height: 50px;
        border-radius: 50%;
    }

    .header-text {
        font-size: 16px;
        font-weight: 500;
        flex: 1;
        padding: 5px;
    }

    /* LOGIN CONTAINER */
    .login-container {
        background-color: #e0b677c8;
        width: 90%;
        max-width: 400px;
        margin: 80px auto;
        padding: 30px;
        border-radius: 10px;
        text-align: center;
    }

    /* Title */
    .login-container h1 {
        margin-bottom: 25px;
        font-size: 28px;
        font-weight: bold;
    }

    /* FORM */
    .form-group {
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        text-align: left;
    }

    label {
        font-size: 14px;
        font-weight: bold;
        margin-bottom: 5px;
    }

    input {
        padding: 8px;
        border: 1px solid #555;
        width: 100%;
        border-radius: 4px;
    }

    /* BUTTON */
    button {
        margin-top: 15px;
        padding: 10px;
        border: none;
        background-color: #a7e3e8;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
        font-size: 16px;
    }

    button:hover {
        background-color: #8f8bd9;
    }

    /* REGISTER */
    .register-link {
        margin-top: 15px;
        font-size: 14px;
        text-align: center;
    }

    .register-link a {
        color: black;
        text-decoration: underline;
    }

    /* ERROR */
    .error {
        color: red;
        font-size: 14px;
        margin-top: 10px;
    }

    /* RESPONSIVE BREAKPOINT */
    @media (max-width: 480px) {

        .header {
            flex-direction: column;
            gap: 8px;   
        }

        .header-text {
            font-size: 14px;
        }

        .login-container {
            margin: 40px auto;
            padding: 20px;
        }

        .login-container h1 {
            font-size: 22px;
        }
    }
    </style>
    </head>

    <body>

    <div class="header">
        <img src="logo_and_product/logo.png" alt="Logo">
        <div class="header-text">
            Welcome to Sweet Royals Online Shop. Where you order we Deliver with care
        </div>
        <div class="profile-icon"></div>
    </div>
        

    <div class="login-container">
        <h1>LOGIN FORM</h1>

        <div class="form-group">
            <label>USERNAME</label>
            <input type="text" id="username">
        </div>

        <div class="form-group">
            <label>PASSWORD</label>
            <input type="password" id="password">
        </div>

        <button onclick="login()">Login</button>
        
        <div class="register-link">
        <a href="register.html">Register</a>
        </div>

        <div class="error" id="error-msg"></div>
    </div>

    <script src="api-client.js"></script>
    <script src="login.js"></script>


    </body>
    </html>
